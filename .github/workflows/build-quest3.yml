name: Build Quest 3 APK

on:
  push:
    branches: [main, feature/nph-yolo-system]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_url:
        description: 'NPH backend API URL'
        required: false
        default: 'http://192.168.1.100:8000'
      skip_build:
        description: 'Skip APK build (scene setup only)'
        required: false
        default: 'false'
        type: boolean

env:
  UNITY_VERSION: 2022.3.20f1
  UNITY_IMAGE: unityci/editor:ubuntu-2022.3.20f1-android-3
  PROJECT_PATH: Quest3VR_Prototype
  BUILD_TARGET: Android
  NPH_API_URL: ${{ github.event.inputs.api_url || 'http://192.168.1.100:8000' }}

jobs:
  build:
    name: Build Quest 3 APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: unity-library-${{ env.UNITY_VERSION }}-${{ env.BUILD_TARGET }}-${{ hashFiles('Quest3VR_Prototype/Assets/**', 'Quest3VR_Prototype/Packages/**', 'Quest3VR_Prototype/ProjectSettings/**') }}
          restore-keys: |
            unity-library-${{ env.UNITY_VERSION }}-${{ env.BUILD_TARGET }}-
            unity-library-${{ env.UNITY_VERSION }}-

      - name: Pull Unity image
        run: docker pull "$UNITY_IMAGE"

      - name: Prepare Unity config
        env:
          SA_KEY_ID: ${{ secrets.UNITY_SA_KEY_ID }}
          SA_SECRET: ${{ secrets.UNITY_SA_SECRET }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          # Write services-config.json for service account licensing
          mkdir -p /tmp/unity-config
          python3 -c "
          import json, os
          config = {
            'enableEntitlementLicensing': True,
            'licensingServiceBaseUrl': 'https://core.cloud.unity3d.com',
            'clientId': os.environ['SA_KEY_ID'],
            'clientSecret': os.environ['SA_SECRET']
          }
          with open('/tmp/unity-config/services-config.json', 'w') as f:
            json.dump(config, f, indent=2)
          "

          # Also write UNITY_LICENSE if available (fallback)
          if [ -n "$UNITY_LICENSE" ]; then
            mkdir -p /tmp/unity-license
            printf '%s' "$UNITY_LICENSE" > /tmp/unity-license/Unity_lic.ulf
          fi

      - name: Setup NPH Scene
        run: |
          docker run --rm \
            -w /github/workspace \
            -v "$GITHUB_WORKSPACE:/github/workspace" \
            -v "/tmp/unity-config/services-config.json:/usr/share/unity3d/config/services-config.json" \
            "$UNITY_IMAGE" \
            unity-editor \
              -batchmode \
              -nographics \
              -projectPath "/github/workspace/$PROJECT_PATH" \
              -buildTarget Android \
              -executeMethod Quest3VR.NPH.Editor.NPHBuildPipeline.SetupOnly \
              -logFile /dev/stdout \
              -quit

      - name: Build APK
        if: ${{ github.event.inputs.skip_build != 'true' }}
        run: |
          mkdir -p build

          docker run --rm \
            -w /github/workspace \
            -v "$GITHUB_WORKSPACE:/github/workspace" \
            -v "/tmp/unity-config/services-config.json:/usr/share/unity3d/config/services-config.json" \
            "$UNITY_IMAGE" \
            unity-editor \
              -batchmode \
              -nographics \
              -projectPath "/github/workspace/$PROJECT_PATH" \
              -buildTarget Android \
              -executeMethod Quest3VR.NPH.Editor.NPHBuildPipeline.BuildAll \
              -logFile /dev/stdout \
              -quit

      - name: Upload APK artifact
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: NPH-Quest3-APK
          path: build/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Build summary
        if: always()
        env:
          API_URL_USED: ${{ env.NPH_API_URL }}
          GIT_REF: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          echo "## Quest 3 Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unity | $UNITY_VERSION |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | Android (Quest 3) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | $GIT_REF |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${GIT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API URL | $API_URL_USED |" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "build/NPH_Quest3.apk" ]; then
            SIZE=$(du -h build/NPH_Quest3.apk | cut -f1)
            echo "| APK Size | $SIZE |" >> "$GITHUB_STEP_SUMMARY"
          fi
