name: Unity License Activation

on:
  workflow_dispatch: {}

jobs:
  request-alf:
    name: Generate activation file (.alf)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate .alf file
        run: |
          docker create --name unity-alf \
            unityci/editor:ubuntu-2022.3.20f1-android-3 \
            unity-editor \
              -batchmode \
              -nographics \
              -createManualActivationFile \
              -logFile /dev/stdout
          docker start -a unity-alf || true
          docker cp unity-alf:/Unity_v2022.3.20f1.alf . 2>/dev/null || true
          docker rm unity-alf

          if [ ! -f Unity_v2022.3.20f1.alf ]; then
            echo "::error::No .alf file found. Unity may have written it to a different path."
            exit 1
          fi
          echo "Generated: Unity_v2022.3.20f1.alf"

      - name: Upload .alf artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity-Activation-File
          path: "*.alf"
          retention-days: 1
          if-no-files-found: error

      - name: Next steps
        run: |
          echo "## Unity License Activation — Next Steps" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "1. **Download** the \`Unity-Activation-File\` artifact from this run" >> "$GITHUB_STEP_SUMMARY"
          echo "2. **Go to** [license.unity3d.com/manual](https://license.unity3d.com/manual)" >> "$GITHUB_STEP_SUMMARY"
          echo "3. **Upload** the \`.alf\` file and follow the prompts" >> "$GITHUB_STEP_SUMMARY"
          echo "4. **Download** the \`.ulf\` file Unity gives you" >> "$GITHUB_STEP_SUMMARY"
          echo "5. **Set secrets** by running:" >> "$GITHUB_STEP_SUMMARY"
          echo '   ```bash' >> "$GITHUB_STEP_SUMMARY"
          echo '   ./scripts/set-unity-secrets.sh path/to/Unity_lic.ulf' >> "$GITHUB_STEP_SUMMARY"
          echo '   ```' >> "$GITHUB_STEP_SUMMARY"
          echo "6. **Trigger build** with:" >> "$GITHUB_STEP_SUMMARY"
          echo '   ```bash' >> "$GITHUB_STEP_SUMMARY"
          echo '   gh workflow run build-quest3.yml' >> "$GITHUB_STEP_SUMMARY"
          echo '   ```' >> "$GITHUB_STEP_SUMMARY"

  verify:
    name: Verify license (after secrets are set)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Unity activation
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.20f1
          projectPath: Quest3VR_Prototype
          targetPlatform: Android
          buildMethod: ''
          customParameters: -quit -batchmode -nographics
