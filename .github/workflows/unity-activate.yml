name: Unity License Activation

on:
  workflow_dispatch: {}

jobs:
  activate-service-account:
    name: Activate via service account
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Activate Unity and extract license
        run: |
          # Create services-config.json for Unity's licensing client
          mkdir -p /tmp/unity-config
          cat > /tmp/unity-config/services-config.json << EOF
          {
            "enableEntitlementLicensing": true,
            "licensingServiceBaseUrl": "https://core.cloud.unity3d.com",
            "clientId": "${{ secrets.UNITY_SA_KEY_ID }}",
            "clientSecret": "${{ secrets.UNITY_SA_SECRET }}"
          }
          EOF

          # Create container (don't start yet)
          docker create --name unity-activate \
            unityci/editor:ubuntu-2022.3.20f1-android-3 \
            unity-editor \
              -batchmode \
              -nographics \
              -logFile /dev/stdout \
              -quit

          # Inject services config into the container
          docker cp /tmp/unity-config/services-config.json \
            unity-activate:/usr/share/unity3d/config/services-config.json

          # Run activation
          docker start -a unity-activate || true

          # Extract all possible license files
          mkdir -p /tmp/licenses
          docker cp unity-activate:/root/.local/share/unity3d/Unity/Unity_lic.ulf /tmp/licenses/ 2>/dev/null || true
          docker cp unity-activate:/Unity_lic.ulf /tmp/licenses/ 2>/dev/null || true

          # Also check for entitlement licenses
          docker cp unity-activate:/root/.config/unity3d/ /tmp/licenses/config/ 2>/dev/null || true

          # List what we found
          echo "=== License files found ==="
          find /tmp/licenses -type f 2>/dev/null
          echo "==========================="

          docker rm unity-activate

          # Check if we got a usable license
          if [ -f /tmp/licenses/Unity_lic.ulf ]; then
            echo "ULF license extracted successfully"
            cp /tmp/licenses/Unity_lic.ulf ./Unity_lic.ulf
          else
            echo "::warning::No .ulf found. Checking for entitlement files..."
            # Copy any found files for the artifact
            find /tmp/licenses -type f -exec cp {} . \; 2>/dev/null || true
          fi

      - name: Upload license artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Unity-License-Files
          path: |
            Unity_lic.ulf
            *.xml
          retention-days: 1
          if-no-files-found: warn

      - name: Summary
        run: |
          echo "## Unity License Activation Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f Unity_lic.ulf ]; then
            echo "License file generated. Download the artifact and run:" >> "$GITHUB_STEP_SUMMARY"
            echo '```bash' >> "$GITHUB_STEP_SUMMARY"
            echo 'gh secret set UNITY_LICENSE < Unity_lic.ulf' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No .ulf generated. Check the logs for licensing errors." >> "$GITHUB_STEP_SUMMARY"
          fi
