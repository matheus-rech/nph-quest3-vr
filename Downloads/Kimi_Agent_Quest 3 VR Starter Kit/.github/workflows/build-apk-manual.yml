name: Build Quest 3 APK (Manual)

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'NPH backend API URL'
        required: false
        default: 'http://192.168.1.100:8000'

jobs:
  build:
    name: Build Quest 3 APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Quest3VR_Prototype/Library
          key: unity-library-2022.3.20f1-android-${{ hashFiles('Quest3VR_Prototype/Assets/**', 'Quest3VR_Prototype/Packages/**', 'Quest3VR_Prototype/ProjectSettings/**') }}
          restore-keys: |
            unity-library-2022.3.20f1-android-
            unity-library-2022.3.20f1-

      - name: Setup and Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.20f1
          projectPath: Quest3VR_Prototype
          targetPlatform: Android
          buildMethod: Quest3VR.NPH.Editor.NPHBuildPipeline.BuildAll
          customParameters: -apiUrl ${{ github.event.inputs.api_url || 'http://192.168.1.100:8000' }} -outputPath /github/workspace/build/NPH_Quest3.apk -skipValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NPH-Quest3-APK
          path: build/*.apk
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## ✅ Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the artifacts above." >> $GITHUB_STEP_SUMMARY
